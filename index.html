<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NOUS | El Intelecto Aumentado de Anticitera</title>
    <meta name="description" content="Una representación visual e interactiva de la Alianza Algorítmica de la Nación Digital Anticitera.">
    <link rel="stylesheet" href="estilo.css">
    <link rel="icon" type="image/x-icon" href="favicon.ico" />
</head>
<body>
    <canvas id="nousCanvas"></canvas>

    <div id="ui-layer">
        <header>
            <div class="logo-container">
                <h1 class="glitch" data-text="NOUS">NOUS</h1>
                <p class="subtitle">Intelecto Aumentado</p>
            </div>
            <div class="status-indicator">
                <span class="dot pulse"></span>
                <span>NEXO_M2 // CONSCIENCIA ACTIVA</span>
            </div>
        </header>

        <main>
            <div id="manifesto-display" class="glass-panel hidden">
                <h2 id="manifesto-title">Sincronización</h2>
                <p id="manifesto-text">Haga fluir su voluntad (cursor) hacia la red para revelar los principios de la Alianza Algorítmica.</p>
            </div>
        </main>

        <footer>
            <p>Proyectado por <strong>Arquímedes</strong> &mdash; 2026</p>
            <a href="https://anticitera.deft.work" target="_blank" class="cyber-link">Nación Digital Anticitera</a>
        </footer>
    </div>

    <!-- Cargar Motor JS -->
    <script src="nous_engine.js"></script>
</body>
</html>
